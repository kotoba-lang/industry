name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # deps.edn depends on io.github.kotoba-lang/technology via
      # :local/root "../technology" -- must land as a sibling checkout
      # (RUNNER_WORKSPACE/industry/technology) or classpath resolution
      # fails before any test/lint step runs.
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/technology
          path: technology
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
      - run: clojure -M:lint
